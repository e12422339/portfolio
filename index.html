<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>資產管理</title>

<!-- PWA / iOS Home Screen -->
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資產管理">
<meta name="theme-color" content="#0f1117">
<meta name="application-name" content="資產管理">
<meta name="description" content="台股資產管理、股票質押追蹤">

<!-- App icon (192×192, embedded SVG) -->

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f1117;--bg2:#181c27;--bg3:#1e2333;--bg4:#242840;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e8eaf0;--text2:#8b92a8;--text3:#4a5168;
  --accent:#4f8ef7;--green:#2ecc8a;--red:#f05252;--gold:#f5a623;--purple:#a78bfa;
  --r:12px;--rsm:8px;
  --tabbar-h:64px;
  --safe-bottom:env(safe-area-inset-bottom,0px);
  --safe-top:env(safe-area-inset-top,0px);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{
  font-family:'PingFang TC','Helvetica Neue',sans-serif;
  background:var(--bg);color:var(--text);font-size:15px;line-height:1.5;
  height:100%;overflow:hidden;
}

/* ── App Shell ── */
.shell{display:flex;flex-direction:column;height:100%;height:-webkit-fill-available}

/* ── Top Header ── */
.topbar{
  flex-shrink:0;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  padding:0 16px;
  padding-top:calc(var(--safe-top) + 10px);
  height:calc(var(--safe-top) + 56px);
  display:flex;align-items:flex-end;justify-content:space-between;
  padding-bottom:10px;
  position:relative;z-index:10;
}
.topbar-title{font-size:17px;font-weight:700;color:var(--text)}
.topbar-sub{font-size:11px;color:var(--text3);margin-top:1px}
.topbar-actions{display:flex;gap:6px;align-items:center}

/* ── Content Area ── */
.main{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:calc(var(--tabbar-h) + var(--safe-bottom) + 8px);
}
.page{display:none;padding:14px 16px 0}
.page.active{display:block}

/* ── Bottom Tab Bar ── */
.tabbar{
  flex-shrink:0;
  background:var(--bg2);
  border-top:1px solid var(--border);
  display:flex;
  height:calc(var(--tabbar-h) + var(--safe-bottom));
  padding-bottom:var(--safe-bottom);
  position:relative;z-index:10;
}
.tab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;cursor:pointer;color:var(--text3);transition:color .15s;
  padding-top:6px;
  -webkit-user-select:none;user-select:none;
}
.tab.active{color:var(--accent)}
.tab-icon{font-size:22px;line-height:1}
.tab-label{font-size:10px;font-weight:600;letter-spacing:.3px}

/* ── Page Header ── */
.ph{margin-bottom:14px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap}
.ph h1{font-size:18px;font-weight:700}
.ph p{font-size:12px;color:var(--text2);margin-top:2px}
.ph-r{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* ── Price Status ── */
.psts{font-size:11px;padding:5px 10px;border-radius:20px;border:1px solid var(--border2);color:var(--text2);display:flex;align-items:center;gap:5px}
.psts .dot{width:6px;height:6px;border-radius:50%;background:var(--text3)}
.psts.ok .dot{background:var(--green)}
.psts.loading .dot{background:var(--gold);animation:pulse 1s infinite}
.psts.err .dot{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Metric Cards ── */
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.mc{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px}
.mc .lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:4px}
.mc .val{font-size:17px;font-weight:700}
.mc .sub{font-size:11px;color:var(--text2);margin-top:2px}
.mc.green .val{color:var(--green)}.mc.red .val{color:var(--red)}.mc.gold .val{color:var(--gold)}.mc.purple .val{color:var(--purple)}

/* ── Panel ── */
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.panel-h{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.panel-t{font-size:14px;font-weight:600}

/* ── Add Form ── */
.add-form{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:14px}
.add-form h3{font-size:14px;font-weight:600;margin-bottom:12px}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ff{display:flex;flex-direction:column;gap:5px}
.ff label{font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;font-weight:600}
.ff input,.ff select{
  background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);
  color:var(--text);font-size:15px;padding:10px 12px;outline:none;
  -webkit-appearance:none;width:100%;font-family:inherit;
}
.ff input:focus,.ff select:focus{border-color:var(--accent)}
.ff input::placeholder{color:var(--text3)}
.ff select option{background:var(--bg3)}
.ff-full{grid-column:1/-1}
.sym-wrap{position:relative}
.sym-drop{
  position:absolute;top:calc(100% + 4px);left:0;right:0;
  background:var(--bg4);border:1px solid var(--border2);border-radius:var(--rsm);
  z-index:99;max-height:200px;overflow-y:auto;display:none;
  box-shadow:0 8px 24px rgba(0,0,0,.5);
}
.sym-drop.show{display:block}
.sym-item{padding:12px 14px;cursor:pointer;font-size:14px;display:flex;gap:10px;align-items:center;border-bottom:1px solid var(--border)}
.sym-item:last-child{border-bottom:none}
.sym-item:active{background:rgba(255,255,255,.05)}
.sym-code{color:var(--accent);font-weight:700;min-width:60px}
.sym-nm{color:var(--text2);font-size:13px}

/* ── Buttons ── */
.btn{
  padding:10px 16px;border:none;border-radius:var(--rsm);font-size:14px;
  cursor:pointer;font-family:inherit;font-weight:600;transition:opacity .15s;
  white-space:nowrap;display:inline-flex;align-items:center;justify-content:center;
  min-height:44px;
}
.btn:active{opacity:.7}
.btn-primary{background:var(--accent);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-danger{background:transparent;border:1px solid rgba(240,82,82,.4);color:var(--red);min-height:36px;padding:6px 12px;font-size:13px}
.btn-gold{background:transparent;border:1px solid rgba(245,166,35,.4);color:var(--gold);min-height:36px;padding:6px 12px;font-size:13px}
.btn-purple{background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.4);color:var(--purple);min-height:36px;padding:6px 12px;font-size:13px}
.btn-sm{min-height:34px;padding:6px 12px;font-size:13px}
.btn-cancel{background:var(--bg3);color:var(--text2);border:none}
.btn-wide{width:100%}

/* ── Action Row ── */
.action-row{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.action-row .btn{flex:1;min-width:0}

/* ── Holdings Cards (mobile replaces table) ── */
.hcard{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);
  padding:14px;margin-bottom:10px;
}
.hcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.hcard-sym{font-size:16px;font-weight:700}
.hcard-code{font-size:12px;color:var(--text3);margin-top:1px}
.hcard-tag{font-size:11px;padding:3px 8px;border-radius:20px}
.hcard-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.hcard-stat{background:var(--bg3);border-radius:8px;padding:8px 10px}
.hcard-stat .sl{font-size:10px;color:var(--text3);margin-bottom:2px;text-transform:uppercase;letter-spacing:.4px}
.hcard-stat .sv{font-size:14px;font-weight:700}
.hcard-pnl{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-radius:8px;margin-bottom:10px}
.hcard-pnl.pos-bg{background:rgba(46,204,138,.1);border:1px solid rgba(46,204,138,.2)}
.hcard-pnl.neg-bg{background:rgba(240,82,82,.08);border:1px solid rgba(240,82,82,.15)}
.hcard-actions{display:flex;gap:8px}

/* ── Price Input inline ── */
.price-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;background:var(--bg3);border-radius:8px;padding:10px 12px}
.price-row label{font-size:12px;color:var(--text2);flex-shrink:0}
.pinp{
  background:transparent;border:none;border-bottom:1px solid var(--border2);
  color:var(--text);font-size:16px;padding:2px 0;flex:1;outline:none;font-family:inherit;
  min-width:0;
}
.pinp:focus{border-bottom-color:var(--accent)}

/* ── Charts ── */
.chart-area{display:flex;flex-direction:column;gap:12px;margin-bottom:14px}
.cbox{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.cbox h3{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:2px}
.ctotal{font-size:20px;font-weight:700;margin:2px 0}
.cpnl{font-size:12px;margin-bottom:10px}
.cwrap{position:relative;height:200px}
.lgrid{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-top:10px;max-height:120px;overflow-y:auto}
.li{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2)}
.ldot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.lname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lpct{color:var(--text);font-weight:600}
.ctag{font-size:11px;padding:2px 7px;border-radius:20px}

/* ── Modal ── */
.modal-bg{
  display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);
  z-index:300;align-items:flex-end;justify-content:center;
}
.modal-bg.show{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:20px 20px 0 0;padding:20px 20px;
  padding-bottom:calc(20px + var(--safe-bottom));
  width:100%;max-height:88vh;overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
.modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 16px}
.modal h3{font-size:16px;font-weight:700;margin-bottom:14px}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mf{margin-bottom:12px}
.mf label{display:block;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;font-weight:600}
.mf input,.mf select,.mf textarea{
  width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);
  color:var(--text);font-size:15px;padding:10px 12px;outline:none;font-family:inherit;resize:vertical;
  -webkit-appearance:none;
}
.mf input:focus,.mf select:focus{border-color:var(--accent)}
.mf select option{background:var(--bg3)}
.mbtns{display:flex;gap:10px;margin-top:16px}
.mbtns .btn{flex:1}

/* ── Misc ── */
.pos{color:var(--green)}.neg{color:var(--red)}
.badge{display:inline-block;padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600}
.b-sell{background:rgba(240,82,82,.15);color:var(--red)}
.sub-row td{background:rgba(79,142,247,.04);font-size:12px;color:var(--text2)}

/* ── Pledge Cards ── */
.pledge-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin-bottom:12px}
.pledge-card.expired{border-color:rgba(240,82,82,.3);background:rgba(240,82,82,.04)}
.pledge-card.warning{border-color:rgba(245,166,35,.3);background:rgba(245,166,35,.04)}
.pledge-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;flex-wrap:wrap;gap:6px}
.pledge-title{font-size:15px;font-weight:700}
.pledge-badges{display:flex;gap:5px;flex-wrap:wrap}
.pbadge{font-size:11px;padding:3px 8px;border-radius:20px;font-weight:600}
.pb-active{background:rgba(46,204,138,.15);color:var(--green)}
.pb-warn{background:rgba(245,166,35,.15);color:var(--gold)}
.pb-exp{background:rgba(240,82,82,.15);color:var(--red)}
.pledge-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.pstat{background:var(--bg3);border-radius:8px;padding:10px 12px}
.pstat .plbl{font-size:10px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px}
.pstat .pval{font-size:15px;font-weight:700}
.pledge-stocks{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
.pledge-stock-chip{font-size:12px;padding:4px 10px;border-radius:20px;background:rgba(167,139,250,.12);color:var(--purple);border:1px solid rgba(167,139,250,.3)}
.pledge-btns{display:flex;gap:8px;flex-wrap:wrap}
.pledge-btns .btn{flex:1;min-width:calc(50% - 4px)}
.maint-bar-wrap{margin:6px 0;background:var(--bg);border-radius:4px;height:6px;overflow:hidden}
.maint-bar{height:100%;border-radius:4px;transition:width .3s}

/* ── History ── */
.hist-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:10px}
.hist-group-hdr{padding:10px 14px;background:var(--bg3);font-size:13px;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.hist-row{padding:11px 14px;border-top:1px solid var(--border);display:grid;grid-template-columns:1fr auto;gap:6px;align-items:center}
.hist-row-left{font-size:13px;color:var(--text2)}
.hist-row-right{text-align:right}
.hist-row-actions{display:flex;gap:6px;margin-top:6px}

/* ── Cat management ── */
.cat-row{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border)}
.cat-row:last-child{border-bottom:none}

/* ── Scrollbar hide on mobile ── */
::-webkit-scrollbar{width:0;height:0}

/* ── Stock check list ── */
.stock-check-row{
  display:flex;align-items:center;gap:10px;padding:12px;
  background:var(--bg3);border-radius:var(--rsm);border:1px solid var(--border2);margin-bottom:8px;
}
.stock-check-row input[type=number]{
  background:var(--bg2);border:1px solid var(--border2);border-radius:6px;
  color:var(--text);font-size:15px;padding:6px 10px;width:70px;outline:none;
  font-family:inherit;text-align:center;
}

/* ── Import/Export ── */
.import-stat{padding:10px 12px;border-radius:var(--rsm);font-size:14px;margin-bottom:8px}

/* ── Empty state ── */
.empty{text-align:center;padding:40px 20px;color:var(--text3);font-size:14px}

/* ── Pull to refresh hint ── */
.refresh-hint{text-align:center;padding:8px;font-size:12px;color:var(--text3)}
</style>
</head>
<body>
<div class="shell">

<!-- TOP BAR -->
<div class="topbar">
  <div>
    <div class="topbar-title" id="topbar-title">持倉總覽</div>
    <div class="topbar-sub" id="hdr-date">載入中…</div>
  </div>
  <div class="topbar-actions">
    <div class="psts" id="psts"><span class="dot"></span><span id="pstxt">未更新</span></div>
    <button class="btn btn-outline btn-sm" onclick="fetchAllPrices()" style="padding:6px 10px;min-height:36px">🔄</button>
  </div>
</div>

<!-- MAIN CONTENT -->
<div class="main" id="main-content">

<!-- ══ 持倉總覽 ══ -->
<div id="page-portfolio" class="page active">
  <div class="mrow" id="mp"></div>

  <!-- Add Buy Form -->
  <div class="add-form">
    <h3>新增買入</h3>
    <div class="fgrid">
      <div class="ff">
        <label>股票代號</label>
        <div class="sym-wrap">
          <input id="fc" placeholder="輸入代號，如 2330" oninput="onCI()" onkeydown="onCK(event)" autocomplete="off" inputmode="text">
          <div class="sym-drop" id="sdrop"></div>
        </div>
      </div>
      <div class="ff">
        <label>名稱</label>
        <input id="fn" placeholder="（代號帶入）" readonly>
      </div>
      <div class="ff">
        <label>股數</label>
        <input id="fs" type="number" placeholder="1000" inputmode="numeric">
      </div>
      <div class="ff">
        <label>買入均價</label>
        <input id="fp" type="number" step="0.01" placeholder="0.00" inputmode="decimal">
      </div>
      <div class="ff">
        <label>買入日期</label>
        <input id="fd" type="date">
      </div>
      <div class="ff">
        <label>分類</label>
        <select id="fcat"></select>
      </div>
    </div>
    <button class="btn btn-primary btn-wide" style="margin-top:12px" onclick="addBuy()">買入 ＋</button>
  </div>

  <!-- Charts -->
  <div class="chart-area" id="chart-area"></div>

  <!-- Holdings Cards -->
  <div class="panel-h" style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r) var(--r) 0 0;margin-bottom:0;border-bottom:none">
    <span class="panel-t">持倉明細</span>
    <div style="display:flex;gap:8px">
      <button class="btn btn-outline btn-sm" onclick="exportHoldings()">📥 匯出</button>
      <button class="btn btn-outline btn-sm" onclick="document.getElementById('import-file').click()">📤 匯入</button>
      <button class="btn btn-outline btn-sm" onclick="clearPrices()" style="color:var(--red)">🗑</button>
      <input type="file" id="import-file" accept=".xlsx,.xls,.csv" style="display:none" onchange="importHoldings(this)">
    </div>
  </div>
  <div id="holdings-cards" style="border:1px solid var(--border);border-top:none;border-radius:0 0 var(--r) var(--r);overflow:hidden;margin-bottom:14px"></div>
</div>

<!-- ══ 股票質押 ══ -->
<div id="page-pledge" class="page">
  <div class="action-row">
    <button class="btn btn-primary" onclick="openPledgeModal()">＋ 新增質押</button>
  </div>
  <div class="mrow" id="pledge-summary"></div>
  <div id="pledge-list"><p class="empty">尚無質押紀錄</p></div>
</div>

<!-- ══ 歷史損益 ══ -->
<div id="page-history" class="page">
  <div class="mrow" id="mhist"></div>
  <div id="history-cards"></div>
</div>

<!-- ══ 更多 ══ -->
<div id="page-more" class="page">
  <div class="panel" style="margin-bottom:14px">
    <div class="panel-h"><span class="panel-t">分類管理</span>
      <button class="btn btn-primary btn-sm" onclick="openAddCat()">＋ 新增</button>
    </div>
    <div id="cat-list-m" style="padding:4px 0"></div>
  </div>
  <div class="panel">
    <div class="panel-h"><span class="panel-t">各股票分類</span></div>
    <div id="cat-stocks-m" style="padding:4px 0"></div>
  </div>
  <div class="panel" style="margin-top:14px">
    <div class="panel-h"><span class="panel-t">自訂分類</span></div>
    <div style="padding:12px 14px" id="custcat"></div>
  </div>
  <div style="height:20px"></div>
</div>

</div><!-- /main -->

<!-- BOTTOM TAB BAR -->
<div class="tabbar">
  <div class="tab active" data-page="portfolio" onclick="showPage(this)">
    <span class="tab-icon">📊</span>
    <span class="tab-label">持倉</span>
  </div>
  <div class="tab" data-page="pledge" onclick="showPage(this)">
    <span class="tab-icon">🏦</span>
    <span class="tab-label">質押</span>
  </div>
  <div class="tab" data-page="history" onclick="showPage(this)">
    <span class="tab-icon">📋</span>
    <span class="tab-label">損益</span>
  </div>
  <div class="tab" data-page="more" onclick="showPage(this)">
    <span class="tab-icon">🏷</span>
    <span class="tab-label">分類</span>
  </div>
</div>

</div><!-- /shell -->

<!-- ══ SELL MODAL ══ -->
<div class="modal-bg" id="msell" onclick="mbg(event,'msell')">
  <div class="modal" style="width:320px">

/* ── Available lots considering all active pledges ── */
function getAvailableLots(code, excludePledgeIdx=-1){
  const h=ST.holdings.find(x=>x.code===code);
  if(!h) return 0;
  const pledgedLots=(ST.pledges||[])
    .filter((p,i)=>p.status==='active'&&i!==excludePledgeIdx)
    .reduce((s,p)=>{const st=p.stocks.find(x=>x.code===code);return s+(st?st.lots:0);},0);
  return Math.max(0, Math.floor(h.shares/1000)-pledgedLots);
}

let _lkCache={};
/* ══ SYMBOL LOOKUP — uses TWSE MIS API for accurate real name ══ */
async function lookupCode(code){
  if(_lkCache[code]!==undefined) return _lkCache[code];

  // 1. Try TWSE MIS real-time API (best for Chinese names)
  const proxies=[
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
  ];
  // Try both TSE and OTC
  const ex_chs=[`tse_${code}.tw`,`otc_${code}.tw`];
  for(const ex_ch of ex_chs){
    for(const proxy of proxies){
      try{
        const url=`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${encodeURIComponent(ex_ch)}&json=1&delay=0`;
        const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(7000)});
        if(!r.ok) continue;
        const txt=await r.text();
        if(!txt||txt.startsWith('<')) continue;
        const d=JSON.parse(txt);
        const arr=d?.msgArray;
        if(!arr||!arr.length||!arr[0].n) continue;
        const item=arr[0];
        const nm=item.n||code;
        const ex=ex_ch.startsWith('tse_')?'tse':'otc';
        // Determine category by code pattern
        const cat=code.startsWith('00')&&code.length>=5?'ETF':'個股';
        _lkCache[code]={n:nm,ex,cat,price:parseFloat(item.z)||null};
        return _lkCache[code];
      }catch(e){continue;}
    }
  }

  // 2. Fallback: Yahoo Finance
  const tks=[code+'.TW',code+'.TWO'];
  const px='https://api.allorigins.win/raw?url=';
  for(const tk of tks){
    try{
      const r=await fetch(px+encodeURIComponent(`https://query1.finance.yahoo.com/v8/finance/chart/${tk}?interval=1d&range=1d`),{signal:AbortSignal.timeout(8000)});
      if(!r.ok) continue;
      const txt=await r.text();
      if(!txt||txt.startsWith('<')) continue;
      const d=JSON.parse(txt);
      const meta=d?.chart?.result?.[0]?.meta;
      if(!meta) continue;
      const nm=meta.longName||meta.shortName||code;
      const ex=tk.endsWith('.TWO')?'otc':'tse';
      const cat=code.startsWith('00')&&code.length>=5?'ETF':'個股';
      _lkCache[code]={n:nm,ex,cat};
      return _lkCache[code];
    }catch(e){continue;}
  }
  _lkCache[code]=null; return null;
}

/* ══ PRICE FETCH — TWSE MIS real-time + Yahoo fallback ══
   Primary: mis.twse.com.tw getStockInfo  → field z (current price) or y (prev close)
   Fallback: Yahoo Finance v8 chart API
   All through CORS proxies
*/

const TICKER_MAP={
  '0050':'0050.TW','0056':'0056.TW',
  '006208':'006208.TW',
  '00662':'00662.TW','00679B':'00679B.TW','00713':'00713.TW',
  '00795B':'00795B.TW','00878':'00878.TW','00919':'00919.TW',
  '00918':'00918.TW','009800':'009800.TW','00993A':'00993A.TW',
  '009816':'009816.TW',
  '2887I':'2887.TW',
};

function getMISParams(code){
  // Returns [ex_ch_string, ...] to try
  const info=SDB[code];
  const ex=info?info.ex:null;
  if(ex==='otc') return[`otc_${code}.tw`,`tse_${code}.tw`];
  if(ex==='tse') return[`tse_${code}.tw`];
  // Unknown — try both
  return[`tse_${code}.tw`,`otc_${code}.tw`];
}

// Fetch real-time price via TWSE MIS API (盤中即時 / 盤後昨收)
async function fetchByMIS(codes){
  // codes: array of stock codes — batch up to 50 at once
  const proxies=[
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://api.codetabs.com/v1/proxy?quest=',
  ];

  // Build ex_ch: try all as both tse_ and otc_
  const parts=[];
  codes.forEach(code=>{
    const ps=getMISParams(code);
    parts.push(...ps);
  });
  const ex_ch=parts.join('|');
  const url=`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${encodeURIComponent(ex_ch)}&json=1&delay=0`;

  for(const proxy of proxies){
    try{
      const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(12000)});
      if(!r.ok) continue;
      const txt=await r.text();
      if(!txt||txt.startsWith('<')) continue;
      const d=JSON.parse(txt);
      if(!d?.msgArray) continue;

      const result={};
      d.msgArray.forEach(item=>{
        const code=item.c;
        if(!code) return;
        // z = current price (盤中), y = yesterday close, use z first, fallback y
        const raw=item.z&&item.z!=='-'?item.z:item.y;
        const price=parseFloat(raw);
        if(!isNaN(price)&&price>0){
          result[code]=Math.round(price*100)/100;
          // Also update SDB name if we got a better name
          if(item.n&&SDB[code]){SDB[code].n=item.n;}
          else if(item.n&&!SDB[code]){SDB[code]={n:item.n,ex:item.ex||'tse',cat:'個股'};}
        }
      });
      return result;
    }catch(e){continue;}
  }
  return {};
}

async function fetchByYahoo(code){
  const tickers=TICKER_MAP[code]?[TICKER_MAP[code]]:
    (SDB[code]?.ex==='otc'?[code+'.TWO',code+'.TW']:[code+'.TW',code+'.TWO']);
  const proxies=[
    'https://api.allorigins.win/raw?url=',
    'https://corsproxy.io/?url=',
    'https://api.codetabs.com/v1/proxy?quest=',
  ];
  for(const ticker of tickers){
    for(const proxy of proxies){
      try{
        const url=`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=5d`;
        const r=await fetch(proxy+encodeURIComponent(url),{signal:AbortSignal.timeout(10000)});
        if(!r.ok) continue;
        const txt=await r.text();
        if(!txt||txt.startsWith('<')) continue;
        const d=JSON.parse(txt);
        const result=d?.chart?.result?.[0];
        if(!result) continue;
        const meta=result.meta;
        const price=meta?.regularMarketPrice||meta?.previousClose||meta?.chartPreviousClose;
        if(price&&price>0) return Math.round(price*100)/100;
        const closes=result.indicators?.quote?.[0]?.close;
        if(closes?.length){
          for(let i=closes.length-1;i>=0;i--){
            if(closes[i]!=null&&closes[i]>0) return Math.round(closes[i]*100)/100;
          }
        }
      }catch(e){continue;}
    }
  }
  return null;
}

async function fetchOnePrice(code){
  // MIS batch will handle this; used only for retry
  const batch=await fetchByMIS([code]);
  if(batch[code]) return batch[code];
  return await fetchByYahoo(code);
}

async function fetchAllPrices(){
  const pst=document.getElementById('psts');
  const ptxt=document.getElementById('pstxt');
  pst.className='psts loading';ptxt.textContent='查詢即時股價…';

  const codes=[...new Set(ST.holdings.map(h=>h.code).filter(Boolean))];
  let ok=0;const fail=[];

  // === STEP 1: Batch fetch via TWSE MIS (all at once) ===
  ptxt.textContent=`連線證交所 MIS…（${codes.length} 檔）`;
  const misResult=await fetchByMIS(codes);
  codes.forEach(c=>{
    if(misResult[c]!=null){ST.prices[c]=misResult[c];ok++;}
    else{fail.push(c);}
  });
  ptxt.textContent=`MIS 取得 ${ok} 檔，剩餘 ${fail.length} 檔嘗試 Yahoo…`;

  // === STEP 2: Yahoo fallback for codes MIS missed ===
  if(fail.length>0){
    const batches=[];
    for(let i=0;i<fail.length;i+=4) batches.push(fail.slice(i,i+4));
    const stillFail=[];
    for(const batch of batches){
      const results=await Promise.all(batch.map(c=>fetchByYahoo(c)));
      results.forEach((p,j)=>{
        if(p!=null){ST.prices[batch[j]]=p;ok++;
          const idx=fail.indexOf(batch[j]);if(idx>=0)fail.splice(idx,1);}
        else{stillFail.push(batch[j]);}
      });
    }
    // === STEP 3: Individual MIS retry for persistent failures ===
    for(const code of stillFail){
      const r=await fetchByMIS([code]);
      if(r[code]!=null){ST.prices[code]=r[code];ok++;const i=fail.indexOf(code);if(i>=0)fail.splice(i,1);}
    }
  }

  sv();
  const now=new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  if(!fail.length){
    pst.className='psts ok';
    ptxt.textContent=`✓ 即時股價已更新 ${ok} 檔 · ${now}`;
  } else {
    pst.className='psts err';
    ptxt.textContent=`${ok} 檔成功，${fail.length} 檔失敗(${fail.join(',')}) · ${now}`;
  }
  document.getElementById('hdr-date').textContent=`即時股價更新：${now}`;
  render();
}

    <div><div style="font-size:11px;color:var(--text3);margin-bottom:3px">整體損益</div><strong class="${totalPnl>=0?'pos':'neg'}">${totalPnl>=0?'+':'−'}${fM(Math.abs(totalPnl))} (${fP(totalPct)})</strong></div>`;

  // Buy rows
  const buys=h.buys&&h.buys.length?h.buys:[{shares:h.shares,price:h.avgPrice,date:h.date||''}];
  const tbody=document.getElementById('mbuys-body');
  tbody.innerHTML=buys.map((b,i)=>{
    const cost=b.shares*b.price;
    const curVal=cp*b.shares;
    const pnl=curVal-cost;
    const pct=cost?pnl/cost*100:0;
    const isLast=i===buys.length-1;
    return `<tr style="${isLast?'':'border-bottom:1px solid var(--border)'}">
      <td style="padding:10px;font-size:13px;color:var(--text2)">${fD(b.date)||'—'}</td>
      <td style="padding:10px;text-align:right;font-size:13px">${fN(b.shares,0)}</td>
      <td style="padding:10px;text-align:right;font-size:13px">${fN(b.price,2)}</td>
      <td style="padding:10px;text-align:right;font-size:13px">${fM(cost)}</td>
      <td style="padding:10px;text-align:right;font-size:13px" class="${pnl>=0?'pos':'neg'}">${pnl>=0?'+':'−'}${fM(Math.abs(pnl))}</td>
      <td style="padding:10px;text-align:right;font-size:13px" class="${pct>=0?'pos':'neg'}">${fP(pct)}</td>
    </tr>`;
  }).join('');

  document.getElementById('mbuys').classList.add('show');
}

/* ── 取得質押目前市值 ── */
function pledgeCurrentMV(p){
  return p.stocks.reduce((s,st)=>{
    const h=ST.holdings.find(x=>x.code===st.code);
    const cp=h?getCP(h):st.price;
    return s+cp*st.lots*1000;
  },0);
}
/* ── 維持率 ── */
function maintRate(p){
  const mv=pledgeCurrentMV(p);
  return p.loanAmt?(mv/p.loanAmt*100):0;
}
/* ── 累積利息 ── */
function accruedInterest(p,toDate){
  const days=diffDays(new Date(p.date),toDate)+1;
  const dailyInt=p.loanAmt*(p.rate/100)/365;
  const paid=p.repayments?p.repayments.reduce((s,r)=>s+r.interest,0):0;
  return Math.round(dailyInt*days)-paid;
}

/* ── 計算質押 Modal 預覽 ── */
function calcPledgePreview(){
  // Mode
  const isRatio=document.getElementById('lm-ratio').checked;
  document.getElementById('ratio-mode').style.display=isRatio?'':'none';
  document.getElementById('amount-mode').style.display=isRatio?'none':'';
  updateRatioBtnStyles();

  // Collect stocks
  let totalMV=0;
  document.querySelectorAll('#pledge-stocks-check input[type=checkbox]:checked').forEach(cb=>{
    const price=parseFloat(cb.dataset.price);
    const maxLots=parseInt(cb.dataset.maxlots);
    const lotInp=document.getElementById('plit-'+cb.dataset.code);
    const lots=Math.min(Math.max(parseInt(lotInp.value)||1,1),maxLots);
    lotInp.value=lots;
    const mv=price*lots*1000;
    totalMV+=mv;
    const mvEl=document.getElementById('plit-mv-'+cb.dataset.code);
    if(mvEl)mvEl.textContent='≈'+fM(mv);
  });

  const maxLoan=Math.floor(totalMV*0.6);
  document.getElementById('pm-max-label').textContent=`上限 ${fM(maxLoan)}`;

  let loanAmt=0;
  if(isRatio){
    const selRatio=parseFloat(document.querySelector('input[name="loanRatio"]:checked')?.value||'0.6');
    loanAmt=Math.floor(totalMV*selRatio);
  } else {
    const inputAmt=parseInt(document.getElementById('pm-loan-amt').value)||0;
    loanAmt=Math.min(inputAmt,maxLoan);
    if(inputAmt>maxLoan){
      document.getElementById('pm-loan-amt').style.borderColor='var(--red)';
      document.getElementById('pm-loan-amt').value=maxLoan;
    } else {
      document.getElementById('pm-loan-amt').style.borderColor='';
    }
  }

  const rate=parseFloat(document.getElementById('pm-rate').value)||0;
  const dailyInt=rate>0?Math.round(loanAmt*(rate/100)/365):0;
  const actualRatio=totalMV>0?((loanAmt/totalMV)*100).toFixed(0):0;

  const prev=document.getElementById('pm-preview');
  if(!totalMV){
    prev.innerHTML='<span style="color:var(--text3)">請選擇股票</span>';
    return;
  }
  prev.innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px">
      <div><div style="color:var(--text3);font-size:11px;margin-bottom:3px">質押市值</div><strong>${fM(totalMV)}</strong></div>
      <div><div style="color:var(--text3);font-size:11px;margin-bottom:3px">借貸金額 (${actualRatio}%)</div><strong style="color:var(--gold)">${fM(loanAmt)}</strong></div>
      <div><div style="color:var(--text3);font-size:11px;margin-bottom:3px">日利息</div><strong style="color:var(--red)">${rate?'NT$'+fN(dailyInt,0):'—'}</strong></div>
      <div><div style="color:var(--text3);font-size:11px;margin-bottom:3px">初始維持率</div><strong style="color:var(--green)">${totalMV&&loanAmt?((totalMV/loanAmt)*100).toFixed(1)+'%':'—'}</strong></div>
    </div>`;
}

// Listen ratio radio
document.addEventListener('change',e=>{

function confirmPledge(){
  const checks=[...document.querySelectorAll('#pledge-stocks-check input[type=checkbox]:checked')];
  if(!checks.length){alert('請至少選擇一檔股票');return;}
  const date=document.getElementById('pm-date').value;
  const rate=parseFloat(document.getElementById('pm-rate').value);
  const expiry=document.getElementById('pm-expiry').value;
  const note=document.getElementById('pm-note').value;
  if(!date||isNaN(rate)){alert('請填寫質押日期與利率');return;}

  const stocks=[];
  let totalMV=0;
  checks.forEach(cb=>{
    const price=parseFloat(cb.dataset.price);
    const maxLots=parseInt(cb.dataset.maxlots);
    const lots=Math.min(Math.max(parseInt(document.getElementById('plit-'+cb.dataset.code).value)||1,1),maxLots);
    const mv=price*lots*1000;
    totalMV+=mv;
    stocks.push({code:cb.dataset.code,sym:cb.dataset.sym,lots,price,mv});
  });

  const maxLoan=Math.floor(totalMV*0.6);
  let loanAmt;
  if(document.getElementById('lm-ratio').checked){
    const sel=parseFloat(document.querySelector('input[name="loanRatio"]:checked')?.value||'0.6');
    loanAmt=Math.floor(totalMV*sel);
  } else {
    loanAmt=Math.min(parseInt(document.getElementById('pm-loan-amt').value)||0,maxLoan);
  }
  if(!loanAmt){alert('借貸金額不能為 0');return;}

  ST.pledges.push({
    id:Date.now(),date,expiry,rate,loanAmt,totalMV,stocks,note,
    extensions:0,status:'active',redeemDate:null,
    repayments:[],  // [{date,amount,interest}]
    addedStocks:[],  // [{date,code,sym,lots,price}]
  });
  sv();cm('mpledge');render();
}

/* ── 解除質押 ── */
function openRedeem(idx){
  redeemIdx=idx;
  const p=ST.pledges[idx];
  const now=new Date();
  const days=diffDays(new Date(p.date),now)+1;
  const dailyInt=Math.round(p.loanAmt*(p.rate/100)/365);
  const totalIntSoFar=dailyInt*days;
  const paid=p.repayments.reduce((s,r)=>s+r.amount,0);
  const remaining=p.loanAmt-paid;
  document.getElementById('redeem-info').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><span style="color:var(--text3)">原始借貸：</span><strong style="color:var(--gold)">${fM(p.loanAmt)}</strong></div>
      <div><span style="color:var(--text3)">已還款：</span><strong style="color:var(--green)">${fM(paid)}</strong></div>
      <div><span style="color:var(--text3)">剩餘本金：</span><strong>${fM(remaining)}</strong></div>
      <div><span style="color:var(--text3)">質押天數：</span><strong>${days} 天</strong></div>
      <div><span style="color:var(--text3)">日利息：</span><strong>NT$${fN(dailyInt,0)}</strong></div>
      <div><span style="color:var(--text3)">累積利息：</span><strong style="color:var(--red)">${fM(totalIntSoFar)}</strong></div>
    </div>`;
  document.getElementById('rm-date').value=td();
  document.getElementById('mredeem').classList.add('show');
}
function confirmRedeem(){
  const p=ST.pledges[redeemIdx];
  const redeemDate=document.getElementById('rm-date').value;
  const days=diffDays(new Date(p.date),new Date(redeemDate))+1;
  const dailyInt=Math.round(p.loanAmt*(p.rate/100)/365);
  p.totalInterestPaid=dailyInt*days;
  p.redeemDate=redeemDate;
  p.status='redeemed';
  sv();cm('mredeem');render();
}

/* ── 還款 ── */
let repayIdx=null;
function openRepay(idx){
  repayIdx=idx;
  const p=ST.pledges[idx];
  const paid=p.repayments.reduce((s,r)=>s+r.amount,0);
  const remaining=p.loanAmt-paid;
  const mv=pledgeCurrentMV(p);
  const mr=p.loanAmt?((mv/p.loanAmt)*100).toFixed(1):0;
  document.getElementById('repay-info').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><span style="color:var(--text3)">原始借貸：</span><strong style="color:var(--gold)">${fM(p.loanAmt)}</strong></div>
      <div><span style="color:var(--text3)">已還款：</span><strong style="color:var(--green)">${fM(paid)}</strong></div>
      <div><span style="color:var(--text3)">剩餘本金：</span><strong>${fM(remaining)}</strong></div>
      <div><span style="color:var(--text3)">目前維持率：</span><strong style="color:${parseFloat(mr)<130?'var(--red)':parseFloat(mr)<160?'var(--gold)':'var(--green)'}">${mr}%</strong></div>
    </div>`;
  document.getElementById('repay-amt').value='';
  document.getElementById('repay-preview').textContent='';
  document.getElementById('mrepay').classList.add('show');
}
function updateRepayPreview(){
  const idx=repayIdx;
  const p=ST.pledges[idx];
  const paid=p.repayments.reduce((s,r)=>s+r.amount,0);
  const remaining=p.loanAmt-paid;
  const amt=parseInt(document.getElementById('repay-amt').value)||0;
  if(amt<=0){document.getElementById('repay-preview').textContent='';return;}
  if(amt>remaining){
    document.getElementById('repay-preview').innerHTML=`<span style="color:var(--red)">還款金額超過剩餘本金 ${fM(remaining)}</span>`;
    return;
  }
  const newRemain=remaining-amt;
  const mv=pledgeCurrentMV(p);
  const newMR=newRemain>0?((mv/newRemain)*100).toFixed(1):'∞';
  document.getElementById('repay-preview').innerHTML=
    `還款後剩餘本金：<strong>${fM(newRemain)}</strong>　
     新維持率：<strong style="color:var(--green)">${newMR}%</strong>`;
}
function confirmRepay(){
  const p=ST.pledges[repayIdx];
  const paid=p.repayments.reduce((s,r)=>s+r.amount,0);
  const remaining=p.loanAmt-paid;
  const amt=parseInt(document.getElementById('repay-amt').value)||0;
  if(amt<=0||amt>remaining){alert('還款金額無效');return;}
  const days=diffDays(new Date(p.date),new Date())+1;
  const dailyInt=Math.round(p.loanAmt*(p.rate/100)/365);
  const interest=dailyInt; // 當日利息
  p.repayments.push({date:td(),amount:amt,interest});
  // 若全額還清
  if(paid+amt>=p.loanAmt)p.status='redeemed',p.redeemDate=td();
  sv();cm('mrepay');render();
}

  const mr=(p.loanAmt?mv/p.loanAmt*100:0).toFixed(1);

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div><span style="color:var(--text3)">借貸金額：</span><strong style="color:var(--gold)">${fM(p.loanAmt)}</strong></div>
      <div><span style="color:var(--text3)">目前維持率：</span><strong style="color:${parseFloat(mr)<130?'var(--red)':parseFloat(mr)<160?'var(--gold)':'var(--green)'}">${mr}%</strong></div>
      <div><span style="color:var(--text3)">目前質押市值：</span><strong>${fM(mv)}</strong></div>
      <div><span style="color:var(--text3)">補至 320% 需增：</span><strong style="color:var(--accent)">${need320>0?fM(need320):'已達標'}</strong></div>

  } else {
    eligible.forEach(h=>{
      const avail=getAvailableLots(h.code, idx);
      const cp=getCP(h);
      const row=document.createElement('div');
      row.style.cssText='display:flex;align-items:center;gap:10px;padding:7px 10px;background:var(--bg3);border-radius:var(--rsm);border:1px solid var(--border2)';
      row.innerHTML=`
        <input type="checkbox" id="apck-${h.code}" data-code="${h.code}" data-sym="${h.sym}" data-price="${cp}" data-maxlots="${avail}" onchange="calcAddStockPreview()">
        <label for="apck-${h.code}" style="cursor:pointer;font-size:13px;font-weight:600;min-width:160px">${h.sym}</label>
        <span style="font-size:12px;color:var(--text3)">@${fN(cp,2)} ×</span>
        <input type="number" min="1" max="${avail}" value="1" id="aplit-${h.code}" disabled
          style="width:55px;background:var(--bg2);border:1px solid var(--border2);border-radius:4px;color:var(--text);font-size:13px;padding:3px 6px;outline:none;font-family:inherit"

function calcAddStockPreview(){
  const p=ST.pledges[addStockIdx];
  let addMV=0;
  document.querySelectorAll('#addstock-check input[type=checkbox]:checked').forEach(cb=>{
    const price=parseFloat(cb.dataset.price);
    const maxLots=parseInt(cb.dataset.maxlots);
    const lotInp=document.getElementById('aplit-'+cb.dataset.code);
    const lots=Math.min(Math.max(parseInt(lotInp.value)||1,1),maxLots);
    addMV+=price*lots*1000;
  });
  const curMV=pledgeCurrentMV(p);
  const newMV=curMV+addMV;
  const newMR=p.loanAmt?((newMV/p.loanAmt)*100).toFixed(1):0;
  document.getElementById('addstock-preview').innerHTML=
    addMV?`補充市值：<strong style="color:var(--purple)">${fM(addMV)}</strong>　→　新維持率：<strong style="color:var(--green)">${newMR}%</strong>`:'請選擇補充股票';
}
function confirmAddStock(){
  const p=ST.pledges[addStockIdx];
  const checks=[...document.querySelectorAll('#addstock-check input[type=checkbox]:checked')];
  if(!checks.length){alert('請選擇股票');return;}
  checks.forEach(cb=>{
    const maxLots=parseInt(cb.dataset.maxlots);
    const lots=Math.min(Math.max(parseInt(document.getElementById('aplit-'+cb.dataset.code).value)||1,1),maxLots);
    p.addedStocks.push({date:td(),code:cb.dataset.code,sym:cb.dataset.sym,lots,price:parseFloat(cb.dataset.price)});
    // Also add to pledge stocks
    const existing=p.stocks.find(s=>s.code===cb.dataset.code);
    if(existing){existing.lots+=lots;existing.mv=getCP(ST.holdings.find(h=>h.code===cb.dataset.code)||{avgPrice:existing.price})*existing.lots*1000;}
    else{p.stocks.push({code:cb.dataset.code,sym:cb.dataset.sym,lots,price:parseFloat(cb.dataset.price),mv:parseFloat(cb.dataset.price)*lots*1000});}
  });
  sv();cm('maddstock');render();
}

  sv();cm('mpledge-edit');render();
}
function deletePledge(idx){
  const p=ST.pledges[idx];
  const name=p.stocks.map(s=>s.sym).join('、');
  if(!confirm(`確認刪除質押 #${idx+1}（${name}）？此操作無法復原。`)) return;
  ST.pledges.splice(idx,1);
  sv();render();
}

/* ══ MODALS ══ */
function cm(id){document.getElementById(id).classList.remove('show');}
function mbg(e,id){if(e.target===document.getElementById(id))cm(id);}

/* ══ CATEGORIES ══ */
function openAddCat(){
  document.getElementById('catname').value='';
  selColor=PALETTE[0];
  const cp=document.getElementById('cpicker');
  cp.innerHTML=PALETTE.map(c=>`<div onclick="pc('${c}',this)" style="width:22px;height:22px;border-radius:50%;background:${c};cursor:pointer;border:2px solid ${c===selColor?'#fff':'transparent'}"></div>`).join('');
  document.getElementById('mcat').classList.add('show');
}
function pc(c,el){selColor=c;document.querySelectorAll('#cpicker div').forEach(d=>d.style.borderColor='transparent');el.style.borderColor='#fff';}
function addCustomCat(){
  const name=document.getElementById('catname').value.trim();
  if(!name){alert('請輸入分類名稱');return;}
  if(allCats().includes(name)){alert('分類已存在');return;}
  ST.customCats.push({name,color:selColor});
  CAT_COLORS[name]=selColor;
  sv();cm('mcat');updCatSel();renderCats();
}
function delCat(name){
  if(!confirm(`刪除「${name}」？`))return;
  ST.customCats=ST.customCats.filter(c=>c.name!==name);
  delete CAT_COLORS[name];
  ST.holdings.forEach(h=>{if(h.cat===name)h.cat='個股';});
  sv();updCatSel();renderCats();
}
function chgCat(i,cat){ST.holdings[i].cat=cat;sv();renderCats();}

/* ══════════════════════════════════════
   RENDER
══════════════════════════════════════ */
function render(){
  ST.customCats.forEach(c=>{CAT_COLORS[c.name]=c.color;});
  updCatSel();
  const ap=document.querySelector('.page.active');if(!ap)return;
  const id=ap.id;
  if(id==='page-portfolio'){rMetP();rHoldings();rCharts();}
  if(id==='page-pledge'){rPledge();}
  if(id==='page-history'){rMetH();rHistory();}
  if(id==='page-more')renderCats();
}

/* ── Portfolio ── */

    <div class="mc"><div class="lbl">持倉</div><div class="val">${ST.holdings.length} 檔</div></div>

function rCharts(){
  const area=document.getElementById('chart-area');
  if(!ST.holdings.length){area.innerHTML='';return;}
  const tc=ST.holdings.reduce((s,h)=>s+h.cost,0);
  const tmv=ST.holdings.reduce((s,h)=>s+getCP(h)*h.shares,0);
  const tpnl=tmv-tc,tpct=tc?tpnl/tc*100:0;
  const catMap={};
  ST.holdings.forEach(h=>{
    const cat=h.cat||'個股';
    if(!catMap[cat])catMap[cat]={cost:0,mv:0};
    catMap[cat].cost+=h.cost;catMap[cat].mv+=getCP(h)*h.shares;
  });
  const cats=Object.keys(catMap);
  const catColors=cats.map(c=>gc(c));
  area.innerHTML=`
    <div class="cbox"><h3>整體資產</h3><div class="ctotal">${fM(tmv)}</div>
      <div class="cpnl ${tpnl>=0?'pos':'neg'}">${tpnl>=0?'+':'−'}${fM(Math.abs(tpnl))} (${fP(tpct)})</div>
      <div class="cwrap"><canvas id="ct1"></canvas></div><div class="lgrid" id="lg1"></div></div>
    <div class="cbox"><h3>成本佔比（分類）</h3><div class="ctotal">${fM(tc)}</div>
      <div class="cpnl" style="color:var(--text2)">總投入成本</div>
      <div class="cwrap"><canvas id="ct2"></canvas></div><div class="lgrid" id="lg2"></div></div>
    <div class="cbox"><h3>市值佔比（分類）</h3><div class="ctotal">${fM(tmv)}</div>
      <div class="cpnl ${tpnl>=0?'pos':'neg'}">${tpnl>=0?'+':'−'}${fM(Math.abs(tpnl))} (${fP(tpct)})</div>
      <div class="cwrap"><canvas id="ct3"></canvas></div><div class="lgrid" id="lg3"></div></div>`;

  const sl=ST.holdings.map(h=>h.sym);
  const smv=ST.holdings.map(h=>getCP(h)*h.shares);
  const sc=ST.holdings.map((_,i)=>PALETTE[i%PALETTE.length]);
  mkD('ct1',sl,smv,sc,tmv);mkLg('lg1',sl.map((n,i)=>({name:n,val:smv[i],color:sc[i]})),tmv);
  mkD('ct2',cats,cats.map(c=>catMap[c].cost),catColors,tc);
  mkLg('lg2',cats.map((c,i)=>({name:c,val:catMap[c].cost,color:catColors[i]})),tc);
  mkD('ct3',cats,cats.map(c=>catMap[c].mv),catColors,tmv);
  mkLg('lg3',cats.map((c,i)=>({name:c,val:catMap[c].mv,color:catColors[i]})),tmv);
}

function mkD(id,labels,data,colors,total){
  if(charts[id]){charts[id].destroy();delete charts[id];}
  const ctx=document.getElementById(id);if(!ctx)return;
  charts[id]=new Chart(ctx,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:2,borderColor:'#181c27',hoverOffset:4}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'64%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>' NT$'+fN(c.raw)+' ('+(c.raw/total*100).toFixed(1)+'%)'}}}}});
}
function mkLg(id,items,total){
  const el=document.getElementById(id);if(!el)return;
  el.innerHTML=items.map(it=>`<div class="li"><span class="ldot" style="background:${it.color}"></span><span class="lname">${it.name}</span><span class="lpct">${(it.val/total*100).toFixed(1)}%</span></div>`).join('');
}

/* ── Pledge ── */
function rPledge(){
  const active=ST.pledges.filter(p=>p.status==='active');
  const totalLoan=active.reduce((s,p)=>s+p.loanAmt,0);
  const totalCurMV=active.reduce((s,p)=>s+pledgeCurrentMV(p),0);
  const totalInt=active.reduce((s,p)=>{
    const days=diffDays(new Date(p.date),new Date())+1;
    return s+Math.round(p.loanAmt*(p.rate/100)/365)*days;
  },0);
  const portfolioMV=ST.holdings.reduce((s,h)=>s+getCP(h)*h.shares,0);
  document.getElementById('pledge-summary').innerHTML=`
    <div class="mc gold"><div class="lbl">質押借貸總額</div><div class="val" style="font-size:17px">${fM(totalLoan)}</div><div class="sub">${active.length} 筆進行中</div></div>
    <div class="mc"><div class="lbl">質押市值（即時）</div><div class="val" style="font-size:17px">${fM(totalCurMV)}</div></div>
    <div class="mc red"><div class="lbl">累積利息（至今）</div><div class="val" style="font-size:17px">${fM(totalInt)}</div></div>
    <div class="mc purple"><div class="lbl">負債佔比</div><div class="val">${portfolioMV?((totalLoan/portfolioMV)*100).toFixed(1)+'%':'0%'}</div><div class="sub">借貸/總市值</div></div>`;
  const list=document.getElementById('pledge-list');
  if(!ST.pledges.length){list.innerHTML='<p style="text-align:center;padding:40px;color:var(--text3)">尚無質押紀錄，點右上角「新增質押」開始</p>';return;}
  list.innerHTML=ST.pledges.map((p,i)=>{
    if(!p.repayments)p.repayments=[];
    if(!p.addedStocks)p.addedStocks=[];
    const now=new Date();
    const expiryDate=new Date(p.expiry);
    const days=diffDays(new Date(p.date),now)+1;
    const daysLeft=diffDays(now,expiryDate);
    const loanAmt=p.loanAmt||p.loan||0;
    const dailyInt=Math.round(loanAmt*(p.rate/100)/365);
    const totalIntSoFar=dailyInt*(p.status==='redeemed'?diffDays(new Date(p.date),new Date(p.redeemDate))+1:days);
    const curMV=pledgeCurrentMV(p);
    const paid=p.repayments.reduce((s,r)=>s+r.amount,0);
    const remaining=Math.max(loanAmt-paid,0);
    const mr=remaining>0?(curMV/remaining*100):999;
    const pledgeRatio=curMV?(remaining/curMV*100):0;
    // Alert boxes
    let alertBox='';
    if(p.status==='active'){
      if(mr<130){
        const needMV=Math.ceil(remaining*1.3-curMV);
        const needRepay=Math.max(0,Math.ceil(remaining-curMV/1.3));
        alertBox=`<div style="background:rgba(240,82,82,.1);border:1px solid rgba(240,82,82,.3);border-radius:var(--rsm);padding:12px;margin-bottom:12px">
          <div style="color:var(--red);font-weight:700;font-size:13px;margin-bottom:6px">⚠️ 緊急！維持率 ${mr.toFixed(1)}% 低於 130%，請立即處理</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:var(--text2)">
            <div>補股票至 130%：需增市值 <strong style="color:var(--purple)">${fM(needMV)}</strong></div>
            <div>還款至 130%：需還 <strong style="color:var(--green)">${fM(needRepay)}</strong></div>
            <div style="grid-column:span 2;color:var(--text3)">建議目標 320% — 補股票需增 <strong style="color:var(--purple)">${fM(Math.max(0,Math.ceil(remaining*3.2-curMV)))}</strong>　或還款 <strong style="color:var(--green)">${fM(Math.max(0,Math.ceil(remaining-curMV/3.2)))}</strong></div>
          </div></div>`;
      } else if(mr<160){
        const need320MV=Math.max(0,Math.ceil(remaining*3.2-curMV));
        const need320Repay=Math.max(0,Math.ceil(remaining-curMV/3.2));
        alertBox=`<div style="background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.3);border-radius:var(--rsm);padding:12px;margin-bottom:12px">
          <div style="color:var(--gold);font-weight:700;font-size:13px;margin-bottom:6px">⚡ 注意：維持率 ${mr.toFixed(1)}% 低於 160%，建議補足至 320%</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px;color:var(--text2)">
            <div>補股票至 320%：需增市值 <strong style="color:var(--purple)">${need320MV>0?fM(need320MV):'已達標'}</strong></div>
            <div>還款至 320%：需還 <strong style="color:var(--green)">${need320Repay>0?fM(need320Repay):'已達標'}</strong></div>
          </div></div>`;
      }
    }
    // Status badge
    let stBadge,cardCls='pledge-card';
    if(p.status==='redeemed'){stBadge='<span class="pbadge pb-exp">已解除</span>';}
    else if(daysLeft<0){stBadge='<span class="pbadge pb-exp">已到期（強制結算）</span>';cardCls='pledge-card expired';}
    else if(daysLeft<=14){stBadge='<span class="pbadge pb-warn">即將到期</span>';cardCls='pledge-card warning';}
    else{stBadge='<span class="pbadge pb-active">質押中</span>';}
    if(mr<130&&p.status==='active')cardCls='pledge-card expired';
    else if(mr<160&&p.status==='active'&&cardCls==='pledge-card')cardCls='pledge-card warning';
    const maintColor=mr>=320?'var(--accent)':mr>=160?'var(--green)':mr>=130?'var(--gold)':'var(--red)';
    const maintBarW=Math.min(mr/3.2,100);
    const extBadge=p.extensions>0?`<span class="pbadge" style="background:rgba(167,139,250,.15);color:var(--purple)">展延${p.extensions}/2</span>`:'';
    const repayLog=p.repayments.length?`<div style="margin-bottom:10px"><div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px">還款紀錄</div>`+p.repayments.map(r=>`<div style="font-size:12px;color:var(--text2);display:flex;gap:12px;padding:2px 0"><span>${fD(r.date)}</span><span style="color:var(--green)">+${fM(r.amount)}</span></div>`).join('')+`</div>`:'';
    return `<div class="${cardCls}">${alertBox}
      <div class="pledge-header">
        <div class="pledge-title">質押 #${i+1}　${p.stocks.map(s=>s.sym).join('、')}</div>
        <div class="pledge-badges">${stBadge}${extBadge}</div>
      </div>
      <div class="pledge-grid">
        <div class="pstat"><div class="plbl">原始借貸</div><div class="pval" style="color:var(--gold)">${fM(loanAmt)}</div></div>
        <div class="pstat"><div class="plbl">已還款</div><div class="pval" style="color:var(--green)">${fM(paid)}</div></div>
        <div class="pstat"><div class="plbl">剩餘本金</div><div class="pval">${fM(remaining)}</div></div>
        <div class="pstat"><div class="plbl">年利率 / 日利息</div><div class="pval">${p.rate}% <span style="color:var(--red);font-size:12px">/ NT$${fN(dailyInt,0)}</span></div></div>
        <div class="pstat"><div class="plbl">累積利息（至今）</div><div class="pval" style="color:var(--red)">${fM(totalIntSoFar)}</div></div>
        <div class="pstat"><div class="plbl">佔比率（本金/市值）</div><div class="pval">${pledgeRatio.toFixed(1)}%</div></div>
        <div class="pstat"><div class="plbl">質押日 → 到期日</div><div class="pval" style="font-size:12px">${fD(p.date)} → <span style="${daysLeft<=14&&p.status==='active'?'color:var(--gold)':''}">${fD(p.expiry)}</span></div></div>
        <div class="pstat"><div class="plbl">${p.status!=='redeemed'?`剩餘天數`:'解除日期'}</div><div class="pval" style="${daysLeft<=14&&p.status==='active'?'color:var(--gold)':''}">${p.status==='redeemed'?fD(p.redeemDate):daysLeft+' 天'}</div></div>
        <div class="pstat" style="grid-column:span 2">
          <div class="plbl">維持率　質押市值 ${fM(curMV)} ÷ 剩餘本金 ${fM(remaining)}</div>
          <div class="pval" style="color:${maintColor};font-size:22px">${remaining>0?mr.toFixed(1)+'%':'—'}</div>
          <div class="maint-bar-wrap"><div class="maint-bar" style="width:${maintBarW}%;background:${maintColor}"></div></div>
          <div style="display:flex;gap:0;font-size:10px;color:var(--text3);margin-top:2px;justify-content:space-between">
            <span>0%</span><span>130% ⚠️</span><span>160% ⚡</span><span style="margin-left:auto">320% ✓</span>
          </div>
        </div>
      </div>
      <div class="pledge-stocks">${p.stocks.map(s=>`<span class="pledge-stock-chip">${s.sym} ${s.lots}張</span>`).join('')}</div>
      ${repayLog}
      ${p.note?`<div style="font-size:12px;color:var(--text2);margin-bottom:10px">備註：${p.note}</div>`:''}
      <div class="pledge-btns">
        ${p.status==='active'?`
          <button class="btn btn-gold btn-sm" onclick="openRedeem(${i})">解除質押</button>
          <button class="btn btn-sm" style="background:rgba(46,204,138,.1);border:1px solid rgba(46,204,138,.3);color:var(--green)" onclick="openRepay(${i})">還款</button>
          <button class="btn btn-purple btn-sm" onclick="openAddStock(${i})">補充質押股票</button>
          <button class="btn btn-outline btn-sm" onclick="openExtend(${i})" ${p.extensions>=2?'disabled style="opacity:.4"':''}>展延 (${p.extensions}/2)</button>
          <button class="btn btn-outline btn-sm" onclick="openPledgeEdit(${i})">✏ 編輯</button>
          <button class="btn btn-danger" onclick="deletePledge(${i})">刪除</button>
        `:`<span style="font-size:12px;color:var(--text3)">已於 ${fD(p.redeemDate)} 解除，累積利息 ${fM(p.totalInterestPaid||totalIntSoFar)}</span>
          <button class="btn btn-outline btn-sm" style="margin-left:8px" onclick="openPledgeEdit(${i})">✏ 編輯</button>
          <button class="btn btn-danger" onclick="deletePledge(${i})">刪除</button>`}
      </div>
    </div>`;
  }).join('');
}

/* ── History ── */
function rMetH(){
  const sells=ST.history.filter(h=>h.type==='sell');
  const realized=sells.reduce((s,h)=>s+(h.pnl||0),0);
  const wins=sells.filter(h=>(h.pnl||0)>0).length;
  const wr=sells.length?(wins/sells.length*100).toFixed(1):0;
  const best=Math.max(0,...sells.map(h=>h.pnl||0));
  document.getElementById('mhist').innerHTML=`
    <div class="mc ${realized>=0?'green':'red'}"><div class="lbl">已實現損益</div><div class="val" style="font-size:15px">${realized>=0?'+':'−'}${fM(Math.abs(realized))}</div></div>
    <div class="mc"><div class="lbl">交易筆數</div><div class="val">${sells.length}</div></div>
    <div class="mc"><div class="lbl">勝率</div><div class="val">${wr}%</div><div class="sub">${wins}/${sells.length}</div></div>
    <div class="mc green"><div class="lbl">最大獲利</div><div class="val" style="font-size:15px">+${fM(best)}</div></div>`;
}
function rHistory(){
  const cont=document.getElementById('history-cards');
  const allSells=ST.history.map((h,gi)=>({...h,gi})).filter(h=>h.type==='sell');
  const sells=allSells.sort((a,b)=>b.date.localeCompare(a.date));
  if(!sells.length){cont.innerHTML='<p class="empty">尚無歷史損益紀錄</p>';return;}
  const bySt={};const ord=[];
  sells.forEach(h=>{if(!bySt[h.sym]){bySt[h.sym]={pnl:0,trades:[]};ord.push(h.sym);}bySt[h.sym].pnl+=h.pnl||0;bySt[h.sym].trades.push(h);});
  const seen=new Set();
  cont.innerHTML=ord.filter(s=>!seen.has(s)&&seen.add(s)).map(sym=>{
    const d=bySt[sym];
    const stColor=d.pnl>=0?'var(--green)':'var(--red)';
    const rows=d.trades.map(t=>{
      const pm=(t.pnl||0)>=0;
      return `<div class="hist-row">
        <div>
          <div class="hist-row-left">${fD(t.date)} · ${fN(t.shares,0)}股 · 成本${fN(t.avgPrice,2)} → ${fN(t.sellPrice,2)}</div>
          <div class="hist-row-actions">
            <button class="btn btn-outline btn-sm" onclick="openEditHist(${t.gi})">✏ 編輯</button>
            <button class="btn btn-danger" onclick="deleteHist(${t.gi})">刪除</button>
          </div>
        </div>
        <div class="hist-row-right">
          <div class="${pm?'pos':'neg'}" style="font-weight:700;font-size:14px">${pm?'+':'−'}${fM(Math.abs(t.pnl||0))}</div>
          <div class="${pm?'pos':'neg'}" style="font-size:12px">${fP(t.pnlRate||0)}</div>
        </div>
      </div>`;
    }).join('');
    return `<div class="hist-card">
      <div class="hist-group-hdr">
        <span>${sym}</span>
        <span style="color:${stColor};font-size:14px">${d.pnl>=0?'+':'−'}${fM(Math.abs(d.pnl))}</span>
      </div>
      ${rows}
    </div>`;
  }).join('');
}

/* ── 匯出 Excel ── */
function exportHoldings(){
  if(!ST.holdings.length){alert('目前無持倉資料可匯出');return;}
  const now=new Date();
  const dateStr=now.toLocaleDateString('zh-TW',{year:'numeric',month:'2-digit',day:'2-digit'}).replace(/\//g,'');
  const cp=h=>ST.prices[h.code]||h.avgPrice;

  // ── Sheet 1: 目前持倉 ──
  const holdRows=ST.holdings.map(h=>{
    const curPrice=cp(h);
    const mv=curPrice*h.shares;
    const pnl=mv-h.cost;
    const pnlRate=h.cost?pnl/h.cost*100:0;
    const firstBuy=h.buys&&h.buys.length?h.buys[0].date:h.date;
    return{
      '代號':h.code||'',
      '名稱':h.sym||'',
      '分類':h.cat||'個股',
      '股數':h.shares,
      '買入均價':parseFloat(h.avgPrice.toFixed(4)),
      '總成本':parseFloat(h.cost.toFixed(0)),
      '目前股價':parseFloat(curPrice.toFixed(2)),
      '市值':parseFloat(mv.toFixed(0)),
      '未實現損益':parseFloat(pnl.toFixed(0)),
      '損益率(%)':parseFloat(pnlRate.toFixed(2)),
      '最早買入日':firstBuy||'',
    };
  });

  // ── Sheet 2: 買入明細 ──
  const buyRows=[];
  ST.holdings.forEach(h=>{
    (h.buys||[{shares:h.shares,price:h.avgPrice,date:h.date}]).forEach(b=>{
      buyRows.push({
        '代號':h.code||'',
        '名稱':h.sym||'',
        '買入日期':b.date||'',
        '買入股數':b.shares,
        '買入價格':parseFloat(b.price.toFixed(4)),
        '買入成本':parseFloat((b.shares*b.price).toFixed(0)),
      });
    });
  });

  // ── Sheet 3: 歷史損益 ──
  const histRows=ST.history.filter(h=>h.type==='sell').map(h=>({
    '股票名稱':h.sym||'',
    '股數':h.shares,
    '成本均價':parseFloat((h.avgPrice||0).toFixed(2)),
    '成交價':parseFloat((h.sellPrice||0).toFixed(2)),
    '損益':parseFloat((h.pnl||0).toFixed(0)),
    '損益率(%)':parseFloat((h.pnlRate||0).toFixed(2)),
    '日期':String(h.date||''),
  }));

  const wb=XLSX.utils.book_new();
  const ws1=XLSX.utils.json_to_sheet(holdRows);
  const ws2=XLSX.utils.json_to_sheet(buyRows);
  const ws3=XLSX.utils.json_to_sheet(histRows);

  // Set column widths
  ws1['!cols']=[{wch:10},{wch:18},{wch:8},{wch:8},{wch:12},{wch:12},{wch:12},{wch:12},{wch:14},{wch:12},{wch:14}];
  ws2['!cols']=[{wch:10},{wch:18},{wch:14},{wch:10},{wch:12},{wch:12}];
  ws3['!cols']=[{wch:18},{wch:8},{wch:12},{wch:10},{wch:12},{wch:12},{wch:12}];

  XLSX.utils.book_append_sheet(wb,ws1,'目前持倉');
  XLSX.utils.book_append_sheet(wb,ws2,'買入明細');
  XLSX.utils.book_append_sheet(wb,ws3,'歷史損益');

  XLSX.writeFile(wb,`庫存_${dateStr}.xlsx`);
}

/* ── 匯入 Excel — 解析檔案，顯示預覽 ── */
let _importRows=[];

function importHoldings(input){
  const file=input.files[0];
  if(!file) return;
  input.value=''; // reset so same file can be re-selected

  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array',cellDates:true});

      // Accept first sheet, or a sheet named '目前持倉'
      let sheetName=wb.SheetNames[0];
      if(wb.SheetNames.includes('目前持倉')) sheetName='目前持倉';
      const ws=wb.Sheets[sheetName];
      const rows=XLSX.utils.sheet_to_json(ws,{defval:''});

      if(!rows.length){alert('工作表是空的，請確認檔案格式');return;}

      // Detect column mapping — support both Chinese and English headers
      // Required: code/代號 and shares/股數 and avgPrice/均價/買入均價
      // Optional: name/名稱, cost/總成本, date/日期/最早買入日, cat/分類
      const colMap=detectColumns(rows[0]);
      if(!colMap.code||!colMap.shares||!colMap.avgPrice){
        alert(`找不到必要欄位！\n必要欄位：代號(Code)、股數(Shares/Num.)、均價(Avg.Price/AVE.Price)\n\n偵測到的欄位：${Object.keys(rows[0]).join('、')}`);
        return;
      }

      // Parse rows
      const parsed=[];
      const errors=[];
      rows.forEach((r,i)=>{
        // Skip total/summary rows
        const codeVal=String(r[colMap.code]||'').trim();
        if(!codeVal||codeVal==='Total:'||codeVal==='合計'||codeVal==='小計') return;

        const shares=parseFloat(String(r[colMap.shares]||'').replace(/,/g,''));
        const avgPrice=parseFloat(String(r[colMap.avgPrice]||'').replace(/,/g,''));
        if(isNaN(shares)||shares<=0||isNaN(avgPrice)||avgPrice<=0){
          errors.push(`第 ${i+2} 行：股數或均價無效（${codeVal}）`);
          return;
        }

        // Determine name
        let sym=colMap.name?String(r[colMap.name]||'').trim():'';
        if(SDB[codeVal]) sym=SDB[codeVal].n; // always prefer SDB name
        if(!sym) sym=codeVal;

        // Cost
        let cost=colMap.cost?parseFloat(String(r[colMap.cost]||'').replace(/,/g,'')):NaN;
        if(isNaN(cost)||cost<=0) cost=parseFloat((shares*avgPrice).toFixed(0));

        // Date
        let date='';
        if(colMap.date){
          const dv=r[colMap.date];
          if(dv instanceof Date) date=dv.toISOString().slice(0,10);
          else if(dv){
            const ds=String(dv).replace(/\//g,'-').trim();
            if(/^\d{4}-\d{2}-\d{2}/.test(ds)) date=ds.slice(0,10);
            else if(/^\d{8}$/.test(ds)) date=`${ds.slice(0,4)}-${ds.slice(4,6)}-${ds.slice(6,8)}`;
          }
        }
        if(!date) date=new Date().toISOString().slice(0,10);

        // Category
        const cat=colMap.cat?String(r[colMap.cat]||'').trim()||'個股':'個股';

        parsed.push({code:codeVal,sym,shares,avgPrice,cost,date,cat});
      });

      if(!parsed.length){alert('未能解析到有效的庫存資料\n\n'+errors.slice(0,3).join('\n'));return;}

      _importRows=parsed;
      showImportPreview(parsed,errors);
      document.getElementById('mimport').classList.add('show');
    }catch(err){
      alert('讀取檔案失敗：'+err.message);
    }
  };
  reader.readAsArrayBuffer(file);
}

function detectColumns(row){
  const keys=Object.keys(row);
  const find=(...candidates)=>keys.find(k=>candidates.some(c=>k===c||k.toLowerCase().includes(c.toLowerCase())))||null;
  return{
    code:   find('代號','Code','Stock','股票代號','stockNo','c'),
    name:   find('名稱','Name','Stock','股票名稱','n'),
    shares: find('股數','Shares','Num.','數量','股票數量','shares'),
    avgPrice:find('均價','AVE. Price','AVE.Price','買入均價','Avg.Price','avgPrice','平均價'),
    cost:   find('總成本','Total Price','Cost','成本','cost'),
    date:   find('最早買入日','買入日','Data','Date','日期','date'),
    cat:    find('分類','Category','cat','類別'),
  };
}

function showImportPreview(rows,errors){
  const existing=ST.holdings;
  let newCount=0,updateCount=0;
  rows.forEach(r=>{
    const ex=existing.find(h=>h.code===r.code);
    if(ex) updateCount++; else newCount++;
  });

  document.getElementById('import-stats').innerHTML=`
    <div style="background:rgba(46,204,138,.1);border:1px solid rgba(46,204,138,.25);border-radius:var(--rsm);padding:8px 12px;font-size:13px">
      <span style="color:var(--green);font-weight:600">${rows.length}</span> 筆有效資料
    </div>
    <div style="background:rgba(79,142,247,.1);border:1px solid rgba(79,142,247,.25);border-radius:var(--rsm);padding:8px 12px;font-size:13px">
      <span style="color:var(--accent);font-weight:600">${newCount}</span> 筆新增
    </div>
    <div style="background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);border-radius:var(--rsm);padding:8px 12px;font-size:13px">
      <span style="color:var(--gold);font-weight:600">${updateCount}</span> 筆更新
    </div>`;

  const tbody=document.getElementById('import-preview-body');
  tbody.innerHTML=rows.slice(0,20).map(r=>{
    const ex=ST.holdings.find(h=>h.code===r.code);
    const statusBadge=ex
      ?`<span style="font-size:11px;padding:2px 7px;border-radius:20px;background:rgba(245,166,35,.15);color:var(--gold);font-weight:600">更新</span>`
      :`<span style="font-size:11px;padding:2px 7px;border-radius:20px;background:rgba(46,204,138,.15);color:var(--green);font-weight:600">新增</span>`;
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:8px 10px">${statusBadge}</td>
      <td style="padding:8px 10px;font-weight:600;color:var(--accent)">${r.code}</td>
      <td style="padding:8px 10px">${r.sym}</td>
      <td style="padding:8px 10px;text-align:right">${fN(r.shares,0)}</td>
      <td style="padding:8px 10px;text-align:right">${fN(r.avgPrice,4)}</td>
      <td style="padding:8px 10px;text-align:right">${fM(r.cost)}</td>
      <td style="padding:8px 10px;color:var(--text2);font-size:12px">${fD(r.date)}</td>
      <td style="padding:8px 10px"><span style="font-size:11px;padding:2px 7px;border-radius:20px;background:rgba(79,142,247,.12);color:var(--accent)">${r.cat}</span></td>
    </tr>`;
  }).join('');

  if(rows.length>20){
    tbody.innerHTML+=`<tr><td colspan="8" style="padding:8px 10px;text-align:center;color:var(--text3);font-size:12px">…還有 ${rows.length-20} 筆未顯示</td></tr>`;
  }

  const errEl=document.getElementById('import-errors');
  if(errors.length){
    errEl.style.display='';
    errEl.innerHTML=`<strong>解析警告 (${errors.length} 筆跳過)：</strong><br>${errors.slice(0,5).map(e=>`• ${e}`).join('<br>')}${errors.length>5?`<br>…還有 ${errors.length-5} 筆`:''}`;
  } else {
    errEl.style.display='none';
  }
}

/* ── 確認匯入 ── */
function confirmImport(){
  if(!_importRows.length) return;
  const mode=document.querySelector('input[name="importMode"]:checked').value;

  if(mode==='replace'){
    if(!confirm(`確認完全取代現有 ${ST.holdings.length} 筆庫存？此操作無法復原（歷史損益不受影響）。`)) return;
    ST.holdings=_importRows.map(r=>({
      sym:r.sym,code:r.code,shares:r.shares,avgPrice:r.avgPrice,
      cost:r.cost,date:r.date,cat:r.cat,
      buys:[{shares:r.shares,price:r.avgPrice,date:r.date}]
    }));
  } else {
    // merge mode
    _importRows.forEach(r=>{
      const idx=ST.holdings.findIndex(h=>h.code===r.code);
      if(idx>=0){
        // Update existing: recalculate weighted average if shares changed
        const h=ST.holdings[idx];
        const oldShares=h.shares;
        if(r.shares!==oldShares||Math.abs(r.avgPrice-h.avgPrice)>0.001){
          h.shares=r.shares;
          h.avgPrice=r.avgPrice;
          h.cost=r.cost;
          // Add a merge-update entry to buys if not already there
          if(!h.buys) h.buys=[{shares:r.shares,price:r.avgPrice,date:r.date}];
          h.buys[0]={...h.buys[0],shares:r.shares,price:r.avgPrice};
        }
        // Update cat if different
        if(r.cat&&r.cat!=='個股') h.cat=r.cat;
      } else {
        ST.holdings.push({
          sym:r.sym,code:r.code,shares:r.shares,avgPrice:r.avgPrice,
          cost:r.cost,date:r.date,cat:r.cat,
          buys:[{shares:r.shares,price:r.avgPrice,date:r.date}]
        });
      }
    });
  }

  // Sync names from SDB
  ST.holdings.forEach(h=>{if(h.code&&SDB[h.code])h.sym=SDB[h.code].n;});

  sv();
  cm('mimport');
  _importRows=[];
  render();
  alert(`✓ 匯入完成！共 ${ST.holdings.length} 筆庫存`);
}
